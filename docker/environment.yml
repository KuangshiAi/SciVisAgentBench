# Unified SciVisAgentBench environment (exported from the validated local `scivis_bench` conda env).
# Two channels are kept because ~48 low-level packages (python, libgcc-ng, _openmp_mutex, ...)
# were originally resolved from Anaconda's `defaults` channel. The Dockerfile accepts the
# Anaconda Terms of Service non-interactively so this solves in an automated build.
# GPU/CUDA wheels are stripped here; CPU-only torch is installed in the Dockerfile instead,
# keeping the image portable across Linux/macOS/Windows and several GB smaller.
name: scivis_bench
